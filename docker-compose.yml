version: "3.9"

services:
  backend:
    build: .
    container_name: vnstock-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"   # Chỉ bind localhost — Nginx sẽ reverse proxy
    env_file:
      - .env
    volumes:
      - app_logs:/app/logs      # Persistent logs nếu cần
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  app_logs:
